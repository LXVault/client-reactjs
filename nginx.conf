server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend container. The browser only ever
    # talks to this origin, so the frontend works behind any host (localhost,
    # Docker, Codespaces) and no CORS configuration is required.
    # `backend` is the docker-compose service name; the port is fixed at 4000.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: route everything that isn't a real file to index.html
    # so client-side React Router can handle the path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
