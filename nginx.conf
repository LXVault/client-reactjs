server {
    # Render detects the open port automatically; 80 is fine for a static SPA.
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # This image only serves the built React app. API calls go straight from the
    # browser to the backend's own origin via the absolute VITE_API_URL baked in
    # at build time (see Dockerfile), so the backend must allow that origin with
    # CORS_ORIGIN. We intentionally do NOT reverse-proxy /api here: on platforms
    # like Render the frontend and backend are separate services with no shared
    # private hostname, so a hardcoded upstream (e.g. "backend") fails to resolve.

    # SPA fallback: route everything that isn't a real file to index.html so
    # client-side React Router can handle the path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
